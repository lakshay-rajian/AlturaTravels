<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .blog-image { display: none; }
    .blog-image:target { display: block; }
  </style>
  
  <!-- Himalayas Trek -->
  <g id="himalayas-trek" class="blog-image">
    <rect width="800" height="400" fill="#C4E1FF" />
    <polygon points="0,400 0,200 100,150 200,250 300,180 400,220 500,150 600,200 700,170 800,250 800,400" fill="#E0E0E0" />
    <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF" stroke="#000000" stroke-width="1">Exploring the Himalayas</text>
  </g>
  
  <!-- Himalayas Monastery -->
  <g id="himalayas-monastery" class="blog-image">
    <rect width="800" height="400" fill="#E3F2FD" />
    <rect x="250" y="150" width="300" height="200" fill="#D32F2F" />
    <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF" stroke="#000000" stroke-width="1">Himalayan Monastery</text>
  </g>
  
  <!-- Himalayas Peaks -->
  <g id="himalayas-peaks" class="blog-image">
    <rect width="800" height="400" fill="#BBDEFB" />
    <polygon points="100,400 200,150 300,250 400,100 500,200 600,150 700,400" fill="#ECEFF1" />
    <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF" stroke="#000000" stroke-width="1">Majestic Himalayan Peaks</text>
  </g>
  
  <!-- Rajasthan Fort -->
  <g id="rajasthan-fort" class="blog-image">
    <rect width="800" height="400" fill="#FFE0B2" />
    <rect x="200" y="150" width="400" height="200" fill="#E65100" />
    <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF" stroke="#000000" stroke-width="1">Royal Rajasthan Forts</text>
  </g>
  
  <!-- Rajasthan Desert -->
  <g id="rajasthan-desert" class="blog-image">
    <rect width="800" height="400" fill="#FFCC80" />
    <path d="M0,300 Q200,200 400,300 Q600,200 800,300 L800,400 L0,400 Z" fill="#FFA726" />
    <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF" stroke="#000000" stroke-width="1">Thar Desert</text>
  </g>
  
  <!-- Rajasthan Culture -->
  <g id="rajasthan-culture" class="blog-image">
    <rect width="800" height="400" fill="#FFCCBC" />
    <circle cx="400" cy="200" r="100" fill="#FF5722" />
    <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF" stroke="#000000" stroke-width="1">Vibrant Rajasthani Culture</text>
  </g>
  
  <!-- Kerala Backwaters -->
  <g id="kerala-backwaters" class="blog-image">
    <rect width="800" height="400" fill="#B2DFDB" />
    <path d="M0,250 L800,250" stroke="#004D40" stroke-width="5" />
    <rect x="300" y="200" width="200" height="50" fill="#795548" />
    <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF" stroke="#000000" stroke-width="1">Kerala Backwaters</text>
  </g>
  
  <!-- Kerala Tea Plantation -->
  <g id="kerala-tea-plantation" class="blog-image">
    <rect width="800" height="400" fill="#C8E6C9" />
    <path d="M0,400 Q200,300 400,350 Q600,300 800,400" fill="#388E3C" />
    <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF" stroke="#000000" stroke-width="1">Tea Plantations of Munnar</text>
  </g>
  
  <!-- Kerala Kathakali -->
  <g id="kerala-kathakali" class="blog-image">
    <rect width="800" height="400" fill="#E0F7FA" />
    <circle cx="400" cy="200" r="100" fill="#00BCD4" />
    <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF" stroke="#000000" stroke-width="1">Kathakali Dance</text>
  </g>
  
  <!-- Ladakh Mountains -->
  <g id="ladakh-mountains" class="blog-image">
    <rect width="800" height="400" fill="#CFD8DC" />
    <polygon points="0,400 100,200 200,300 300,150 400,250 500,100 600,200 700,150 800,400" fill="#607D8B" />
    <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF" stroke="#000000" stroke-width="1">Ladakh Mountains</text>
  </g>
  
  <!-- Ladakh Monastery -->
  <g id="ladakh-monastery" class="blog-image">
    <rect width="800" height="400" fill="#ECEFF1" />
    <rect x="250" y="150" width="300" height="200" fill="#F44336" />
    <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF" stroke="#000000" stroke-width="1">Ancient Ladakh Monastery</text>
  </g>
  
  <!-- Ladakh Biking -->
  <g id="ladakh-biking" class="blog-image">
    <rect width="800" height="400" fill="#B0BEC5" />
    <path d="M100,300 L700,300" stroke="#455A64" stroke-width="5" />
    <circle cx="400" cy="280" r="20" fill="#263238" />
    <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF" stroke="#000000" stroke-width="1">Motorcycle Adventures in Ladakh</text>
  </g>
  
  <!-- Goa Beaches -->
  <g id="goa-beaches" class="blog-image">
    <rect width="800" height="400" fill="#81D4FA" />
    <path d="M0,300 L800,300" stroke="#03A9F4" stroke-width="5" />
    <path d="M0,300 Q200,250 400,300 Q600,250 800,300 L800,400 L0,400 Z" fill="#FFF176" />
    <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF" stroke="#000000" stroke-width="1">Golden Beaches of Goa</text>
  </g>
  
  <!-- Goa Portuguese Architecture -->
  <g id="goa-portuguese-architecture" class="blog-image">
    <rect width="800" height="400" fill="#FFECB3" />
    <rect x="250" y="150" width="300" height="200" fill="#FFA000" />
    <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF" stroke="#000000" stroke-width="1">Portuguese Heritage</text>
  </g>
  
  <!-- Goa Seafood -->
  <g id="goa-seafood" class="blog-image">
    <rect width="800" height="400" fill="#FFCCBC" />
    <circle cx="400" cy="200" r="100" fill="#FF5722" />
    <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF" stroke="#000000" stroke-width="1">Goan Seafood Delicacies</text>
  </g>
</svg>