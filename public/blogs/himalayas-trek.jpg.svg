<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7CB9E8" />
      <stop offset="100%" stop-color="#C4E1FF" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#skyGradient)" />
  
  <!-- Snow-capped mountains -->
  <polygon points="0,400 0,200 100,150 200,250 300,180 400,220 500,150 600,200 700,170 800,250 800,400" fill="#E0E0E0" />
  <polygon points="0,400 0,230 100,180 200,280 300,210 400,250 500,180 600,230 700,200 800,280 800,400" fill="#BDBDBD" />
  <polygon points="0,400 0,260 100,210 200,310 300,240 400,280 500,210 600,260 700,230 800,310 800,400" fill="#9E9E9E" />
  <polygon points="0,400 0,290 100,240 200,340 300,270 400,310 500,240 600,290 700,260 800,340 800,400" fill="#757575" />
  
  <!-- Trekkers on mountain path -->
  <path d="M300,300 Q350,280 400,300" stroke="#5D4037" stroke-width="3" fill="none" />
  <circle cx="320" cy="290" r="5" fill="#4CAF50" /> <!-- Trekker 1 -->
  <circle cx="350" cy="285" r="5" fill="#F44336" /> <!-- Trekker 2 -->
  <circle cx="380" cy="290" r="5" fill="#2196F3" /> <!-- Trekker 3 -->
  
  <!-- Prayer flags -->
  <line x1="500" y1="250" x2="500" y2="200" stroke="#5D4037" stroke-width="2" />
  <rect x="500" y="200" width="10" height="8" fill="#F44336" />
  <rect x="510" y="200" width="10" height="8" fill="#4CAF50" />
  <rect x="520" y="200" width="10" height="8" fill="#FFEB3B" />
  <rect x="530" y="200" width="10" height="8" fill="#2196F3" />
  <rect x="540" y="200" width="10" height="8" fill="#9C27B0" />
  
  <!-- Sun -->
  <circle cx="700" cy="100" r="40" fill="#FFD54F" />
  <circle cx="700" cy="100" r="30" fill="#FFECB3" />
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF" stroke="#000000" stroke-width="1">Exploring the Himalayas</text>
</svg>